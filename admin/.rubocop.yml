# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Maintainability gates (replacing the hosted qlty checks). Omakase disables
# all Metrics cops; re-enable the complexity ones with sensible thresholds.
Metrics/CyclomaticComplexity:
  Enabled: true
  Max: 10

Metrics/PerceivedComplexity:
  Enabled: true
  Max: 10

Metrics/AbcSize:
  Enabled: true
  Max: 25

Metrics/MethodLength:
  Enabled: true
  Max: 30
  Exclude:
    - "db/**/*"
